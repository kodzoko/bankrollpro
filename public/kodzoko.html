<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KODZOKO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000008;
      font-family: 'Orbitron', sans-serif;
      cursor: none;
    }

    /* ─── Custom cursor ─────────────────────────────────────────── */
    .cursor {
      position: fixed; width: 8px; height: 8px;
      background: #00f5ff; border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff;
      transition: transform 0.05s ease;
    }
    .cursor-ring {
      position: fixed; width: 36px; height: 36px;
      border: 1px solid rgba(0,245,255,0.4); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.12s ease, width 0.2s, height 0.2s;
    }

    /* ─── Background radial glow ────────────────────────────────── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 50%,
        rgba(30, 20, 90, 0.75) 0%,
        rgba(10, 5, 40, 0.5) 45%,
        transparent 75%);
      animation: glowPulse 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.08); }
    }

    /* ─── Grid floor ────────────────────────────────────────────── */
    .grid-floor {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.045) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 90% 70% at 50% 80%,
        black 0%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 80%,
        black 0%, transparent 75%);
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridDrift {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 0 60px, 0 0; }
    }

    /* ─── Floating particles ────────────────────────────────────── */
    .particles { position: fixed; inset: 0; z-index: 2; overflow: hidden; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%;
      background: rgba(0, 245, 255, 0.6);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ─── Parallax wrapper ──────────────────────────────────────── */
    #parallax-scene {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      will-change: transform;
    }

    /* ─── Logo SVG neon glass ───────────────────────────────────── */
    .logo-wrap {
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 2.5rem;
      animation: fadeInZoom 2s cubic-bezier(0.16,1,0.3,1) both;
    }
    .logo-svg {
      filter: drop-shadow(0 0 8px #00f5ff) drop-shadow(0 0 20px #00aeff) drop-shadow(0 0 40px rgba(0,174,255,0.4));
      animation: breatheLogo 6s ease-in-out infinite 2s, glitchLogo 8s steps(1) infinite 3s;
    }
    @keyframes breatheLogo {
      0%, 100% { filter: drop-shadow(0 0 8px #00f5ff) drop-shadow(0 0 20px #00aeff) drop-shadow(0 0 40px rgba(0,174,255,0.4)); transform: scale(1); }
      50%       { filter: drop-shadow(0 0 14px #00f5ff) drop-shadow(0 0 35px #00aeff) drop-shadow(0 0 60px rgba(0,174,255,0.6)); transform: scale(1.03); }
    }
    @keyframes glitchLogo {
      0%,94%,100% { transform: translate(0,0) skewX(0deg); }
      95%  { transform: translate(-3px, 1px) skewX(-2deg); }
      96%  { transform: translate( 3px,-1px) skewX( 2deg); }
      97%  { transform: translate(-2px, 2px) skewX(-1deg); }
      98%  { transform: translate( 0,   0  ) skewX( 0deg); }
    }

    /* ─── KODZOKO text ──────────────────────────────────────────── */
    .brand-text {
      font-family: 'Syncopate', 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 8vw, 7.5rem);
      letter-spacing: 0.5rem;
      text-transform: uppercase;
      background: linear-gradient(
        135deg,
        #ffffff 0%,
        #b0d4ff 18%,
        #00f5ff 35%,
        #e8f4ff 50%,
        #7eb8ff 65%,
        #00d4ff 80%,
        #ffffff 100%
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation:
        fadeInZoom 2.4s cubic-bezier(0.16,1,0.3,1) 0.3s both,
        metallicShift 6s ease-in-out infinite 2.7s,
        breatheText 7s ease-in-out infinite 2.7s,
        glitchText 10s steps(1) infinite 4s;
      position: relative;
    }
    @keyframes metallicShift {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }
    @keyframes breatheText {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.018); }
    }
    @keyframes glitchText {
      0%,91%,100% { clip-path: none; transform: scale(1) translate(0,0); }
      92% { clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); transform: scale(1) translate(-4px, 0); }
      93% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); transform: scale(1) translate( 4px, 0); }
      94% { clip-path: polygon(0  0%, 100%  0%, 100% 15%, 0 15%); transform: scale(1) translate(-2px, 0); }
      95% { clip-path: none; transform: scale(1) translate(0,0); }
    }

    /* shared fade-in + zoom */
    @keyframes fadeInZoom {
      from { opacity: 0; transform: scale(0.88); filter: blur(6px); }
      to   { opacity: 1; transform: scale(1);    filter: blur(0px); }
    }

    /* ─── Tagline ───────────────────────────────────────────────── */
    .tagline {
      margin-top: 1.4rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.55rem, 1.5vw, 0.85rem);
      letter-spacing: 0.35rem;
      color: rgba(0, 245, 255, 0.45);
      text-transform: uppercase;
      animation: fadeInZoom 3s cubic-bezier(0.16,1,0.3,1) 1s both;
    }

    /* ─── Corner accents ────────────────────────────────────────── */
    .corner {
      position: fixed; width: 28px; height: 28px;
      border-color: rgba(0,245,255,0.35);
      border-style: solid;
      z-index: 20;
      animation: fadeInZoom 2s ease 1.5s both;
    }
    .corner-tl { top:20px; left:20px; border-width: 2px 0 0 2px; }
    .corner-tr { top:20px; right:20px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom:20px; left:20px; border-width: 0 0 2px 2px; }
    .corner-br { bottom:20px; right:20px; border-width: 0 2px 2px 0; }

    /* ─── Scanlines overlay ─────────────────────────────────────── */
    .scanlines {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.06) 2px,
        rgba(0,0,0,0.06) 4px
      );
    }

    /* ─── Vignette ──────────────────────────────────────────────── */
    .vignette {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse 100% 100% at 50% 50%,
        transparent 50%, rgba(0,0,8,0.85) 100%);
    }

    /* ─── Horizontal line accents ───────────────────────────────── */
    .h-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,245,255,0.4), transparent);
      animation: lineExpand 1.5s cubic-bezier(0.16,1,0.3,1) 1.8s both;
    }
    @keyframes lineExpand {
      from { width: 0; opacity: 0; }
      to   { width: 260px; opacity: 1; }
    }
    .line-above { bottom: calc(100% + 18px); left: 50%; transform: translateX(-50%); }
    .line-below { top:  calc(100% + 18px); left: 50%; transform: translateX(-50%); }

    /* ─── Center content wrapper ────────────────────────────────── */
    .center-block { position: relative; display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- Background layers -->
  <div class="bg-glow"></div>
  <div class="grid-floor"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Corner accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Main parallax scene -->
  <div id="parallax-scene">
    <div class="center-block">

      <!-- LOGO — inline SVG recreating the 'n'-shaped glyph -->
      <div class="logo-wrap">
        <svg class="logo-svg" width="110" height="130" viewBox="0 0 110 130"
             fill="none" xmlns="http://www.w3.org/2000/svg"
             aria-label="KODZOKO logo glyph">
          <defs>
            <!-- Neon glass glow filter -->
            <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur1"/>
              <feGaussianBlur in="SourceGraphic" stdDeviation="8"   result="blur2"/>
              <feGaussianBlur in="SourceGraphic" stdDeviation="18"  result="blur3"/>
              <feMerge>
                <feMergeNode in="blur3"/>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>

            <!-- Semi-transparent glass fill gradient -->
            <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="rgba(255,255,255,0.18)"/>
              <stop offset="50%"  stop-color="rgba(0,245,255,0.10)"/>
              <stop offset="100%" stop-color="rgba(160,220,255,0.14)"/>
            </linearGradient>

            <!-- Stroke gradient for metallic edge -->
            <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.95"/>
              <stop offset="40%"  stop-color="#00f5ff" stop-opacity="0.9"/>
              <stop offset="100%" stop-color="#7eb8ff" stop-opacity="0.85"/>
            </linearGradient>
          </defs>

          <!--
            The 'n' glyph: two arched humps sharing a spine,
            with curled feet — rendered as a smooth cubic bezier path.
          -->

          <!-- Glass fill (inner semi-transparent layer) -->
          <path
            d="
              M 22 118
              C 22 118 18 108 18 88
              C 18 62 28 42 42 30
              C 52 21 62 18 70 22
              C 80 27 84 38 84 50
              C 84 62 78 72 78 82
              C 78 88 80 94 84 96
              C 88 98 92 95 94 91
              C 96 87 95 82 93 80
              L 90 82
              M 78 82
              C 78 98 74 114 70 118
            "
            stroke="url(#glassGrad)"
            stroke-width="16"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            opacity="0.5"
          />

          <!-- Main crisp path -->
          <path
            d="
              M 22 118
              C 22 118 18 108 18 88
              C 18 62 28 42 42 30
              C 52 21 62 18 70 22
              C 80 27 84 38 84 50
              C 84 62 78 72 78 82
              C 78 88 80 94 84 96
              C 88 98 92 95 94 91
              C 96 87 95 82 93 80
              L 90 82
              M 78 82
              C 78 98 74 114 70 118
            "
            stroke="url(#strokeGrad)"
            stroke-width="6.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
            filter="url(#neonGlow)"
          />
        </svg>
      </div>

      <!-- Decorative line above text -->
      <div style="position:relative; width:100%; display:flex; justify-content:center;">
        <div class="h-line line-above" style="position:relative; left:0; transform:none; margin-bottom:18px;"></div>
      </div>

      <!-- Brand name -->
      <h1 class="brand-text" aria-label="KODZOKO">KODZOKO</h1>

      <!-- Decorative line below text -->
      <div style="position:relative; width:100%; display:flex; justify-content:center;">
        <div class="h-line line-below" style="position:relative; left:0; transform:none; margin-top:18px;"></div>
      </div>

      <!-- Tagline -->
      <p class="tagline">Beyond the Horizon</p>
    </div>
  </div>

  <script>
    /* ── Particles ──────────────────────────────────────────────── */
    const container = document.getElementById('particles');
    const COUNT = 28;
    for (let i = 0; i < COUNT; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 0.8;
      const left = Math.random() * 100;
      const dur  = Math.random() * 18 + 12;
      const del  = Math.random() * 15;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${left}%;
        animation-duration:${dur}s;
        animation-delay:-${del}s;
        opacity:${Math.random() * 0.5 + 0.2};
      `;
      container.appendChild(p);
    }

    /* ── Custom cursor ──────────────────────────────────────────── */
    const cursor     = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursorRing');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    (function animRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      cursorRing.style.left = rx + 'px';
      cursorRing.style.top  = ry + 'px';
      requestAnimationFrame(animRing);
    })();

    /* ── Mouse parallax ─────────────────────────────────────────── */
    const scene = document.getElementById('parallax-scene');
    const W = () => window.innerWidth;
    const H = () => window.innerHeight;
    let targetX = 0, targetY = 0, currentX = 0, currentY = 0;
    const STRENGTH = 18;

    document.addEventListener('mousemove', e => {
      const cx = e.clientX / W() - 0.5;
      const cy = e.clientY / H() - 0.5;
      targetX = cx * STRENGTH;
      targetY = cy * STRENGTH;
    });

    (function animParallax() {
      currentX += (targetX - currentX) * 0.06;
      currentY += (targetY - currentY) * 0.06;
      scene.style.transform = `translate(${currentX}px, ${currentY}px)`;
      requestAnimationFrame(animParallax);
    })();

    /* ── Touch parallax (mobile) ───────────────────────────────── */
    document.addEventListener('touchmove', e => {
      const t = e.touches[0];
      const cx = t.clientX / W() - 0.5;
      const cy = t.clientY / H() - 0.5;
      targetX = cx * (STRENGTH * 0.5);
      targetY = cy * (STRENGTH * 0.5);
    }, { passive: true });

    /* ── Cursor hide/show on leave/enter ────────────────────────── */
    document.addEventListener('mouseleave', () => {
      cursor.style.opacity = '0';
      cursorRing.style.opacity = '0';
    });
    document.addEventListener('mouseenter', () => {
      cursor.style.opacity = '1';
      cursorRing.style.opacity = '1';
    });
  </script>
</body>
</html>
